version: 2

models:
  - name: employee
    description: "Employee DBT model"
    columns:
      - name: emp_id
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments: 
                values: ['1', '2', '3', '4', '5']
                config:
                  severity: warn
      - name: emp_salary
        data_tests:
          - salary_check
  - name: customer
    description: "DBT Model for the customer table"
sources:
  - name: employee
    database: PC_DBT_DB
    schema: PUBLIC
    tables:
      - name: EMPLOYEE_RAW
  - name: customer
    database: PC_DBT_DB
    schema: PUBLIC
    tables:
      - name: CUSTOMER_SRC


