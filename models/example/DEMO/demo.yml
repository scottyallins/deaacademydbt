version: 2

models:
  - name: employee
    description: "Employee DBT model"
    columns:
      - name: emp_id
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments: 
                values: ['1', '2', '3', '4', '5']
                config:
                  severity: warn


sources:
  - name: employee
    database: PC_DBT_DB
    schema: PUBLIC
    tables:
      - name: EMPLOYEE_RAW